# config/rubrics.yaml
# Canonical rubric definitions for pedagogical evaluation.
# Each rubric is scored on a 1-10 integer scale.
# weight: contribution to overall_score (1.0 = equal weight; adjust for experiments).
# scoring_guide: concrete anchors to reduce LLM score variance.
# evaluation_questions: guiding questions the LLM must answer before committing a score.
#
# ARCHITECTURE: Two-Gate Assessment Model (ADR-016, ADR-017)
# - module_rubrics: Assess atomic content segments (chapters people read).
# - course_rubrics:  Assess holistic structure & coherence of the course as a whole.

module_rubrics:
  - id: goal_focus
    name: "Goal Focus"
    description: >
      Does the text concentrate on explaining core concepts relevant to the
      stated Learning Outcomes from the Course Metadata, or does it include
      unnecessary digressions and fluff?
      It should prioritize 'Must-Know' information over supplemental details.
    weight: 1.0
    criteria:
      - "The content directly addresses the module's stated topic or heading"
      - "No significant off-topic digressions or filler paragraphs are present"
      - "Must-know concepts are prioritized over supplemental trivia"
      - "The body of the segment delivers coherently on the topic it actually teaches — evaluated on content structure, not on whether the extracted heading label matches"
      - "The content density is appropriate — no padding, no repetition for the sake of length"
    evaluation_questions:
      - "Does every paragraph directly serve the segment's stated learning goal?"
      - "Are there digressions, historical tangents, or off-topic content that distract from the core topic?"
      - "Is 'must-know' content clearly prioritized over 'nice-to-know' details?"
      - "If the segment has a heading, does the body text match and fully deliver on it?"
    scoring_guide:
      low: "1-3: Significant digressions, unclear objectives, much irrelevant content"
      mid: "4-6: Mostly on-topic but with some unnecessary tangents"
      high: "7-10: Tightly focused on stated objectives, minimal digressions"

  - id: text_readability
    name: "Text Readability"
    description: >
      How accessible is the language used? Does the learner spend effort
      understanding terminology rather than concepts? Ensure content is
      grammatically correct, free of spelling errors, and avoids ambiguities.
      Grammatical errors, typos, and poorly constructed sentences that impede
      comprehension must be penalised here.
    weight: 1.0
    criteria:
      - "Sentences are reasonably short and not overloaded with clauses"
      - "Vocabulary matches the stated audience level"
      - "No grammatical errors or ambiguous phrasing detected"
      - "Ideas are presented one at a time rather than piled together"
      - "The text reads naturally without requiring re-reading to understand"
    evaluation_questions:
      - "Are sentences clear and appropriately short for the target audience?"
      - "Are there grammatical errors, spelling mistakes, or typos that impede reading?"
      - "Do any paragraphs feel rushed, incomplete, or structurally awkward?"
      - "Is the vocabulary level appropriate — neither too basic nor unnecessarily complex?"
      - "Are code blocks and prose balanced so neither overwhelms the other?"
    scoring_guide:
      low: "1-3: Dense, inaccessible language; frequent grammatical errors, typos, or ambiguous sentences that block comprehension"
      mid: "4-6: Generally readable but some passages are unnecessarily complex, grammatically awkward, or contain minor errors"
      high: "7-10: Clear, concise, grammatically correct, well-paced prose appropriate for the intended audience"

  - id: pedagogical_clarity
    name: "Pedagogical Clarity"
    description: >
      Does the text avoid unexplained jargon? Is sentence structure appropriate
      for the intended audience? Technical terminology must be defined
      consistently upon first use.
    weight: 1.0
    criteria:
      - "Every technical term is defined at or before its first use"
      - "No unexplained acronyms or abbreviations are present"
      - "Sentence structure is appropriate for the intended audience"
      - "Terminology is used consistently throughout the segment"
      - "Explanations move from simple to complex, not the reverse"
    evaluation_questions:
      - "Is every new technical term defined at or before its first use?"
      - "Is notation and terminology consistent throughout the segment, or does naming shift?"
      - "Would a student who just started this course follow the explanations without an instructor?"
      - "Are concepts introduced in a logical order (prerequisite concepts before dependent ones)?"
    scoring_guide:
      low: "1-3: Heavy unexplained jargon, undefined terms throughout"
      mid: "4-6: Some terms undefined, occasional clarity issues"
      high: "7-10: All terms defined at first use, consistently clear language"

  - id: example_concreteness
    name: "Example Concreteness"
    description: >
      Are examples concrete, relatable, and plausible representations
      of real-world situations? Code examples must solve recognisable
      problems — not just demonstrate syntax with placeholder variables.
      Scenarios should be realistic enough that the learner understands
      WHY a concept is useful, not just HOW to type it.
    weight: 1.0
    criteria:
      - "At least one concrete example is present in the segment"
      - "Examples use realistic data or scenarios, not placeholders like a=5 or x=[1,2,3]"
      - "Each example demonstrates WHY the concept is useful, not just HOW to type it"
      - "Examples are complete enough to be followed without guessing"
      - "The example connects to a recognizable real-world situation"
    evaluation_questions:
      - "Do examples use realistic, domain-grounded data (e.g. student records, sales figures, inventory) rather than trivial placeholders (a=5, x=[1,2,3])?"
      - "After reading an example, would a student understand WHY this concept is useful in the real world?"
      - "Are variable names meaningful (e.g. `student_name`, `total_price`) rather than generic (x, y, foo)?"
      - "Do examples match the cognitive level of the target audience, or are they too trivial / too complex?"
    scoring_guide:
      low: "1-3: No examples, or only abstract pseudo-descriptions without actual code/scenarios"
      mid: "4-6: Code examples present but use trivial/generic data (a=5, x=[1,2,3], 'mrcet college'); no real-world motivation for the examples"
      high: "7-10: Examples use realistic scenarios (student records, inventory systems, file processing, data analysis) that demonstrate WHY a concept is useful"

  - id: example_coherence
    name: "Example Coherence"
    description: >
      Are examples consistent and thematically connected across sections?
      Examples should build on each other rather than being isolated vignettes.
    weight: 1.0
    criteria:
      - "Examples use a consistent domain or theme within the segment"
      - "Later examples build on or reference earlier ones"
      - "Variable names and scenarios are consistent across examples"
      - "No two examples contradict each other"
      - "Examples collectively tell a coherent mini-story rather than being isolated snippets"
    evaluation_questions:
      - "Do examples across the segment share a common domain or running scenario?"
      - "Does each new example build on or extend something already introduced, or does it reset completely?"
      - "If the segment has multiple sub-topics, do the examples form a coherent narrative thread?"
      - "Are there jarring tonal or domain shifts between examples (e.g. switching from medical data to gaming scores mid-segment)?"
    scoring_guide:
      low: "1-3: Examples contradict each other or are thematically scattered"
      mid: "4-6: Some thematic connection but inconsistencies exist"
      high: "7-10: Examples build on each other and form a coherent narrative"

course_rubrics:
  - id: prerequisite_alignment
    name: "Prerequisite Alignment"
    description: >
      Across the whole course, are foundational concepts introduced before
      dependent ones? Do the assumed prerequisites match the explicitly stated
      Prerequisites from the Course Metadata? Does the course ordering respect
      the Target Audience's expected knowledge base?
    weight: 1.0
    criteria:
      - "Foundational concepts are introduced before the modules that depend on them"
      - "The stated prerequisites in course metadata match what the content actually assumes"
      - "No module requires knowledge that was never taught earlier in the course"
      - "The course respects the target audience's expected starting knowledge level"
      - "Concept dependencies follow a clear logical order across modules"
    evaluation_questions:
      - "Are all foundational concepts introduced before the modules that depend on them?"
      - "Do the assumed prerequisites in the content match the explicitly stated prerequisites in the metadata?"
      - "Would a student with only the listed prerequisites be able to follow the first module without prior exposure?"
      - "Are there any 'prerequisite surprises' — concepts used without introduction that the target audience would not know?"
    scoring_guide:
      low: "1-3: Concepts used before introduction, prerequisites unstated or incorrect"
      mid: "4-6: Mostly ordered but some gaps in prerequisite handling across modules"
      high: "7-10: Clear logical progression across all modules, all prerequisites explicit"

  - id: structural_usability
    name: "Structural Usability"
    description: >
      Is the course as a whole logically organized? Are navigation and
      module boundaries clear? Are the overall structure, table of contents,
      and guidelines explicit? Technical requirements and support resources
      should be easily locatable.
    weight: 1.0
    criteria:
      - "A clear table of contents exists and reflects the actual module structure"
      - "Module boundaries are clearly defined and consistently labeled"
      - "Navigation cues (headings, numbering, summaries) are present throughout"
      - "Technical requirements or setup instructions are easy to locate"
      - "The overall structure follows a recognizable and logical course format"
    evaluation_questions:
      - "Is there a clear table of contents or module overview that lets a student plan their study?"
      - "Are module/chapter boundaries clearly demarcated with headings or section numbers?"
      - "Could a student jumping directly to a specific topic find it without reading from the start?"
      - "Are supplemental materials (exercises, references, summaries) clearly separated from instructional content?"
    scoring_guide:
      low: "1-3: Poor organization, missing navigation cues, unclear module structure"
      mid: "4-6: Adequate structure but some modules are hard to navigate or locate"
      high: "7-10: Well-organized course with clear navigation and explicit module structure"

  - id: business_relevance
    name: "Business Relevance"
    description: >
      Does the course connect its content to real-world professional tasks that the
      Target Audience would face in their careers? Are there projects, case studies,
      industry scenarios, or applied exercises that demonstrate HOW and WHERE to use
      the skills being taught? Simply covering a topic that appears in the Learning
      Outcomes is NOT sufficient — the content must show practical application context.
      A course that teaches syntax without showing real-world usage scores low.
      WARNING — Anti-inflation rule: The presence of a domain-labelled variable
      (e.g. employee_salary = 50000) does NOT constitute business relevance. A course
      that names a real-world domain but never shows a professional making a decision,
      solving a task, or using a skill in a realistic workflow anchors at 4 (mid).
      A score of 7+ requires demonstrated professional workflow context — a realistic
      scenario, a real task, or an explicit bridge from the concept to professional use.
      A 9-10 requires this consistently across the majority of modules, not just once.
    weight: 1.0
    criteria:
      - "The course connects its content to real professional tasks the target audience would face"
      - "The majority of examples use industry-relevant scenarios with realistic data — not domain-labelled placeholders"
      - "The course demonstrates WHERE and HOW skills are used in practice, not just what they are"
      - "Applied projects, case studies, or industry scenarios are present"
      - "A working professional in the target role would find the content practically useful"
    evaluation_questions:
      - "Are there real-world projects, case studies, or industry scenarios anywhere in the course?"
      - "Do examples show HOW and WHERE a concept is used professionally, not just how to write the syntax?"
      - "Would a student finishing this course know what kinds of real jobs or tasks they could now do?"
      - "Is the gap between academic exercises and professional application explicitly bridged?"
    scoring_guide:
      low: "1-3: Purely syntactic/theoretical; no real-world scenarios, projects, or industry context"
      mid: "4-6: Some practical elements but examples use trivial/generic data (a=5, x=[1,2,3]); lacking industry context"
      high: "7-10: Rich real-world scenarios, industry-relevant projects, applied case studies throughout"

  - id: fluidity_continuity
    name: "Fluidity and Continuity"
    description: >
      Do transitions between modules feel coherent and intentional, or does
      the course jump abruptly between unrelated topics? Does the narrative
      thread carry naturally from one module to the next?
    weight: 1.0
    criteria:
      - "Transitions between modules are explicit and intentional, not abrupt"
      - "Later modules reference and build on concepts from earlier ones"
      - "The course follows a single coherent narrative thread from start to finish"
      - "No module feels like it was inserted out of place"
      - "The pacing across modules is consistent — no sudden jumps in complexity"
    evaluation_questions:
      - "Do modules transition smoothly, or are there jarring topic jumps with no bridging material?"
      - "Is there a narrative or thematic thread that ties the course together from start to finish?"
      - "Does each module's ending naturally lead into the next module's opening topic?"
      - "Is progress cumulative — do later modules build explicitly on earlier ones?"
    scoring_guide:
      low: "1-3: Jarring module-to-module transitions, disconnected topics, abrupt jumps"
      mid: "4-6: Some rough inter-module transitions but overall followable"
      high: "7-10: Smooth, logical flow between modules throughout the entire course"

  - id: instructional_alignment
    name: "Instructional Alignment"
    description: >
      Across the entire course, are the learning content, activities, and stated
      Learning Outcomes (from the Course Metadata) clearly aligned? Do the modules
      collectively deliver on the course's explicit learning objectives? Are
      instructional strategies (depth, pacing, examples, exercises) consistent
      with the defined Target Audience and Level?
      WARNING — Anti-inflation rule: Simply listing or touching every topic in
      the Learning Outcomes is NOT sufficient for a high score. A course that covers
      all topics at a surface level anchors at 6 (adequate). A 7+ requires evidence
      that the instructional depth and activities match the complexity demanded by
      the LOs. A 9-10 requires rich, purposeful alignment throughout all modules.
    weight: 1.0
    criteria:
      - "Every stated learning outcome is addressed by at least one module"
      - "The instructional depth matches the complexity demanded by the learning outcomes"
      - "Activities and exercises are aligned with what the learning outcomes require"
      - "The pacing is consistent with the stated audience level throughout"
      - "The course as a whole delivers on its stated objectives, not just touches them"
    evaluation_questions:
      - "Does every stated Learning Outcome have at least one module that directly and substantively addresses it?"
      - "Is the instructional depth (time spent, complexity of examples) proportional to the importance of each LO?"
      - "Are the teaching strategies (lectures, worked examples, exercises) appropriate for the Target Audience's level?"
      - "Are there any Learning Outcomes that are named but never actually delivered in the content?"
      - "Is the pacing appropriate — not rushing complex topics or over-explaining trivial ones?"
    scoring_guide:
      low: "1-3: Major topics from Learning Outcomes are absent or deeply misrepresented"
      mid: "4-6: All LO topics present but delivery is shallow, rushed, or mismatched to audience level — mere topic coverage anchors here"
      high: "7-8: All LOs addressed with appropriate depth and instructional strategy consistent with the stated level"
      top: "9-10: Exemplary alignment — every module's depth, pacing, and activities directly and purposefully advance the course's learning objectives"
