<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemanticFlow — Evaluation Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f1a;
            --surface: #13162a;
            --surface2: #1a1e35;
            --surface3: #212541;
            --border: #2a2f52;
            --border2: #363c66;
            --text: #e2e4f0;
            --text-dim: #7a80a8;
            --text-muted: #4a506e;
            --accent: #6b7fff;
            --accent2: #4a56d4;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --green-dim: rgba(34, 197, 94, 0.12);
            --amber-dim: rgba(245, 158, 11, 0.12);
            --red-dim: rgba(239, 68, 68, 0.12);
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --panel-w: 460px;
            --topbar-h: 56px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
        }

        /* ── TOP BAR ── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--topbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            z-index: 100;
        }

        .topbar-logo {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.05em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .topbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        .topbar-course {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .topbar-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .load-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface3);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .load-btn:hover {
            background: var(--border);
            border-color: var(--accent2);
        }

        .load-btn svg {
            flex-shrink: 0;
        }

        #file-input {
            display: none;
        }

        /* ── LAYOUT ── */
        .layout {
            display: flex;
            height: 100vh;
            padding-top: var(--topbar-h);
        }

        /* ── MAIN SCROLL ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            min-width: 0;
            transition: margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main.panel-open {
            margin-right: var(--panel-w);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - var(--topbar-h) - 48px);
            gap: 16px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.4;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-dim);
        }

        .empty-sub {
            font-size: 13px;
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
        }

        .empty-btn {
            margin-top: 8px;
            background: var(--accent2);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .empty-btn:hover {
            background: var(--accent);
        }

        /* ── COURSE HEADER ── */
        .course-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .course-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .course-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .pill {
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .pill.accent {
            border-color: var(--accent2);
            color: var(--accent);
        }

        .eval-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .eval-stat span {
            color: var(--text-dim);
        }

        /* ── GATE CARDS ── */
        .gate-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 720px) {
            .gate-cards {
                grid-template-columns: 1fr;
            }
        }

        .gate-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .gate-card:hover {
            background: var(--surface2);
        }

        .gate-card.module-card {
            border-left: 3px solid #6b7fff;
        }

        .gate-card.course-card {
            border-left: 3px solid var(--green);
        }

        .gate-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .gate-name {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        .gate-overall {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
        }

        .gate-overall small {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .gate-rubric-mini {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .rubric-mini-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rubric-mini-name {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            width: 150px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mini-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            overflow: hidden;
        }

        .mini-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rubric-mini-score {
            font-family: var(--mono);
            font-size: 10px;
            width: 30px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        /* ── ASSESSMENT TREE ── */
        .tree-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tree-gate {
            border-bottom: 1px solid var(--border);
        }

        .tree-gate:last-child {
            border-bottom: none;
        }

        .tree-gate-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            background: var(--surface2);
            user-select: none;
            transition: background 0.15s;
        }

        .tree-gate-header:hover {
            background: var(--surface3);
        }

        .tree-chevron {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .tree-chevron.open {
            transform: rotate(90deg);
        }

        .tree-gate-label {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            flex: 1;
        }

        .tree-gate-label.module {
            color: var(--accent);
        }

        .tree-gate-label.course {
            color: var(--green);
        }

        .tree-gate-score {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
        }

        .tree-rubrics {
            display: none;
        }

        .tree-rubrics.open {
            display: block;
        }

        .tree-rubric-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 16px 9px 42px;
            border-top: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.12s;
        }

        .tree-rubric-row:hover {
            background: var(--surface2);
        }

        .tree-rubric-row.active {
            background: var(--surface3);
        }

        .rubric-arrow {
            font-size: 9px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .rubric-name {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            flex: 1;
        }

        .rubric-bar-wrap {
            width: 120px;
            height: 5px;
            background: var(--surface3);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .rubric-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rubric-score {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            width: 36px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ── SEGMENTS LIST ── */
        .segments-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .segments-header {
            padding: 12px 16px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .segment-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.12s;
        }

        .segment-row:first-of-type {
            border-top: none;
        }

        .segment-row:hover {
            background: var(--surface2);
        }

        .segment-row.active {
            background: var(--surface3);
        }

        .seg-id {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            width: 32px;
            flex-shrink: 0;
        }

        .seg-heading {
            flex: 1;
            font-size: 13px;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .seg-avg-bar-wrap {
            width: 80px;
            height: 5px;
            background: var(--surface3);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .seg-avg-score {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            width: 32px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ── SCORE COLORS ── */
        .score-high {
            color: var(--green);
        }

        .score-mid {
            color: var(--amber);
        }

        .score-low {
            color: var(--red);
        }

        .bar-high {
            background: var(--green);
        }

        .bar-mid {
            background: var(--amber);
        }

        .bar-low {
            background: var(--red);
        }

        /* ── SLIDE-OUT PANEL ── */
        .panel {
            position: fixed;
            top: var(--topbar-h);
            right: 0;
            width: var(--panel-w);
            height: calc(100vh - var(--topbar-h));
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            overflow: hidden;
        }

        .panel.open {
            transform: translateX(0);
        }

        .panel-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            flex-shrink: 0;
        }

        .panel-title {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .panel-close {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            transition: background 0.12s, color 0.12s;
        }

        .panel-close:hover {
            background: var(--surface3);
            color: var(--text);
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }

        /* panel: rubric view */
        .panel-rubric-name {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .panel-score-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .panel-score-big {
            font-family: var(--mono);
            font-size: 32px;
            font-weight: 600;
        }

        .panel-bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--surface3);
            border-radius: 4px;
            overflow: hidden;
        }

        .panel-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }

        .panel-label {
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-top: 16px;
        }

        .panel-rationale {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 13px;
            color: var(--text);
            line-height: 1.65;
            font-style: italic;
        }

        /* panel: all-segment scores table */
        .seg-scores-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }

        .seg-scores-table th {
            text-align: left;
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: 4px 6px;
            border-bottom: 1px solid var(--border);
        }

        .seg-scores-table td {
            padding: 6px 6px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            vertical-align: top;
        }

        .seg-scores-table tr:last-child td {
            border-bottom: none;
        }

        .seg-scores-table .td-score {
            font-family: var(--mono);
            font-weight: 600;
            white-space: nowrap;
        }

        .seg-scores-table .td-rat {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
            max-width: 240px;
        }

        .seg-scores-table .td-id {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* panel: segment view */
        .toggle-layer {
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .toggle-layer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface2);
            cursor: pointer;
            user-select: none;
            transition: background 0.12s;
        }

        .toggle-layer-header:hover {
            background: var(--surface3);
        }

        .toggle-layer-title {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
        }

        .toggle-layer-chevron {
            color: var(--text-muted);
            font-size: 10px;
            transition: transform 0.2s;
        }

        .toggle-layer-chevron.open {
            transform: rotate(180deg);
        }

        .toggle-layer-body {
            display: none;
            padding: 14px;
            border-top: 1px solid var(--border);
        }

        .toggle-layer-body.open {
            display: block;
        }

        /* scores layer */
        .score-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .score-grid-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-grid-name {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            width: 160px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-grid-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface3);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-grid-val {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        /* rationale layer */
        .rat-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rat-item-name {
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .rat-item-text {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .rat-item {
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .rat-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        /* full text layer */
        .seg-full-text {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg);
            border-radius: 4px;
            padding: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .seg-summary-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .seg-summary-label {
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.25s ease forwards;
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="topbar-logo">⬡ SemanticFlow</div>
        <div class="topbar-sep"></div>
        <div class="topbar-course" id="topbar-course">Evaluation Viewer</div>
        <div class="topbar-meta" id="topbar-meta"></div>
        <!-- File switcher (visible once multiple files are loaded) -->
        <select id="file-switcher" style="display:none;background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:6px;font-family:var(--sans);font-size:12px;cursor:pointer;flex-shrink:0;" onchange="switchFile(this.value)"></select>
        <button class="load-btn" onclick="document.getElementById('file-input').click()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Load outputs.json files
        </button>
        <input type="file" id="file-input" accept=".json" multiple onchange="loadFiles(event)">
    </div>

    <!-- LAYOUT -->
    <div class="layout">
        <div class="main" id="main">

            <!-- EMPTY STATE -->
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">◈</div>
                <div class="empty-title">No evaluations loaded</div>
                <div class="empty-sub">Select one or more SemanticFlow <code
                        style="font-family:var(--mono);background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:12px;">outputs.json</code>
                    files to explore their pedagogical assessment trees.</div>
                <button class="empty-btn" onclick="document.getElementById('file-input').click()">Load outputs.json files</button>
            </div>

            <!-- CONTENT (hidden until loaded) -->
            <div id="content" style="display:none">

                <!-- Course header -->
                <div class="course-header fade-in" id="course-header"></div>

                <!-- Gate cards -->
                <div class="gate-cards fade-in" id="gate-cards"></div>

                <!-- Assessment Tree -->
                <div class="section-title">Assessment Tree</div>
                <div class="tree-wrap fade-in" id="tree-wrap"></div>

                <!-- Segments -->
                <div class="section-title" id="seg-section-title">Instructional Segments</div>
                <div class="segments-wrap fade-in" id="segments-wrap"></div>

            </div>
        </div>

        <!-- SLIDE-OUT PANEL -->
        <div class="panel" id="panel">
            <div class="panel-topbar">
                <div class="panel-title" id="panel-title">Detail</div>
                <button class="panel-close" onclick="closePanel()">✕</button>
            </div>
            <div class="panel-body" id="panel-body"></div>
        </div>
    </div>

    <script>
        // ─── STATE ───────────────────────────────────────────────────────────────────
        let DATA = null;
        let FILES = {}; // filename -> parsed JSON
        let activePanel = null; // 'rubric:{gate}:{key}' | 'segment:{id}'

        // ─── FILE LOADING ─────────────────────────────────────────────────────────────
        function loadFiles(e) {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            let loaded = 0;
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = evt => {
                    try {
                        FILES[file.name] = JSON.parse(evt.target.result);
                    } catch (err) {
                        console.warn('Could not parse ' + file.name + ': ' + err.message);
                    }
                    loaded++;
                    if (loaded === files.length) onAllLoaded();
                };
                reader.readAsText(file);
            });
            e.target.value = '';
        }

        function onAllLoaded() {
            const names = Object.keys(FILES);
            if (!names.length) return;
            // Populate switcher
            const switcher = document.getElementById('file-switcher');
            switcher.innerHTML = names.map(n =>
                `<option value="${esc(n)}">${esc(n)}</option>`
            ).join('');
            switcher.style.display = names.length > 1 ? 'block' : 'none';
            // Load first file
            DATA = FILES[names[0]];
            switcher.value = names[0];
            render();
        }

        function switchFile(name) {
            if (!FILES[name]) return;
            DATA = FILES[name];
            render();
        }

        // ─── SCORE HELPERS ────────────────────────────────────────────────────────────
        function scoreClass(s) {
            if (s >= 8) return 'score-high';
            if (s >= 6) return 'score-mid';
            return 'score-low';
        }
        function barClass(s) {
            if (s >= 8) return 'bar-high';
            if (s >= 6) return 'bar-mid';
            return 'bar-low';
        }
        function barWidth(s) { return Math.round((s / 10) * 100) + '%'; }
        function fmt(n) { return typeof n === 'number' ? n.toFixed(2) : '—'; }

        function segAvg(seg) {
            const scores = seg.scores || {};
            const vals = Object.values(scores).filter(v => typeof v === 'number' && v > 0);
            if (!vals.length) return 0;
            return vals.reduce((a, b) => a + b, 0) / vals.length;
        }

        // ─── MAIN RENDER ─────────────────────────────────────────────────────────────
        function render() {
            if (!DATA) return;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            renderTopbar();
            renderCourseHeader();
            renderGateCards();
            renderTree();
            renderSegments();
            closePanel();
        }

        function renderTopbar() {
            const m = DATA.course_metadata || {};
            const em = DATA.evaluation_meta || {};
            document.getElementById('topbar-course').textContent = m.title || 'Untitled Course';
            document.getElementById('topbar-meta').textContent =
                [em.model_used, em.timestamp ? em.timestamp.slice(0, 10) : ''].filter(Boolean).join(' · ');
        }

        function renderCourseHeader() {
            const m = DATA.course_metadata || {};
            const em = DATA.evaluation_meta || {};
            const el = document.getElementById('course-header');

            const pills = [
                m.author && `<span class="pill">${esc(m.author)}</span>`,
                m.publisher && `<span class="pill">${esc(m.publisher)}</span>`,
                m.subject && `<span class="pill">${esc(m.subject)}</span>`,
                m.level && `<span class="pill">${esc(m.level)}</span>`,
                m.year && `<span class="pill">${esc(m.year)}</span>`,
                em.prompt_version && `<span class="pill accent">prompt v${esc(em.prompt_version)}</span>`,
            ].filter(Boolean).join('');

            const scored = em.instructional_segments_scored ?? '?';
            const total = em.total_segments ?? '?';
            const excl = em.excluded_segments ?? '?';

            el.innerHTML = `
    <div class="course-title">${esc(m.title || 'Untitled Course')}</div>
    <div class="course-pills">${pills}</div>
    <div class="eval-stats">
      <div>Model <span>${esc(em.model_used || '—')}</span></div>
      <div>Scored <span>${scored}</span> / ${total} segments</div>
      <div>Excluded <span>${excl}</span></div>
      <div>Source <span>${esc(m.source || '—')}</span></div>
    </div>
  `;
        }

        function renderGateCards() {
            const assessment = DATA.assessment || {};
            const mg = assessment.module_gate || {};
            const cg = assessment.course_gate || {};
            const el = document.getElementById('gate-cards');

            el.innerHTML = gateCard('module', 'Module Gate', mg) + gateCard('course', 'Course Gate', cg);
        }

        function gateCard(type, label, gate) {
            const overall = gate.overall_score ?? 0;
            const rubrics = gate.rubrics || {};
            const rows = Object.entries(rubrics).map(([key, val]) => {
                const s = val.score ?? 0;
                return `
      <div class="rubric-mini-row">
        <div class="rubric-mini-name">${esc(key)}</div>
        <div class="mini-bar-wrap"><div class="mini-bar ${barClass(s)}" style="width:${barWidth(s)}"></div></div>
        <div class="rubric-mini-score ${scoreClass(s)}">${fmt(s)}</div>
      </div>`;
            }).join('');

            return `
    <div class="gate-card ${type}-card" onclick="openGateInTree('${type}')">
      <div class="gate-card-header">
        <div class="gate-name">${label}</div>
        <div class="gate-overall ${scoreClass(overall)}">${fmt(overall)}<small> / 10</small></div>
      </div>
      <div class="gate-rubric-mini">${rows || '<div style="color:var(--text-muted);font-size:12px">No rubric data</div>'}</div>
    </div>`;
        }

        function openGateInTree(type) {
            const id = `tree-gate-${type}`;
            const rubrics = document.getElementById(`tree-rubrics-${type}`);
            const chevron = document.getElementById(`tree-chevron-${type}`);
            if (rubrics && !rubrics.classList.contains('open')) {
                rubrics.classList.add('open');
                if (chevron) chevron.classList.add('open');
            }
            setTimeout(() => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);
        }

        function renderTree() {
            const assessment = DATA.assessment || {};
            const mg = assessment.module_gate || {};
            const cg = assessment.course_gate || {};
            const el = document.getElementById('tree-wrap');

            el.innerHTML =
                treeGate('module', 'Module Gate', mg, true) +
                treeGate('course', 'Course Gate', cg, true);
        }

        function treeGate(type, label, gate, open) {
            const overall = gate.overall_score ?? 0;
            const rubrics = gate.rubrics || {};

            const rows = Object.entries(rubrics).map(([key, val]) => {
                const s = val.score ?? 0;
                return `
      <div class="tree-rubric-row" id="rubric-row-${type}-${key}"
           onclick="openRubricPanel('${type}','${key}')">
        <span class="rubric-arrow">▶</span>
        <span class="rubric-name">${esc(key)}</span>
        <div class="rubric-bar-wrap"><div class="rubric-bar ${barClass(s)}" style="width:${barWidth(s)}"></div></div>
        <span class="rubric-score ${scoreClass(s)}">${fmt(s)}</span>
      </div>`;
            }).join('');

            return `
    <div class="tree-gate" id="tree-gate-${type}">
      <div class="tree-gate-header" onclick="toggleGate('${type}')">
        <svg class="tree-chevron ${open ? 'open' : ''}" id="tree-chevron-${type}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="5,3 11,8 5,13"/>
        </svg>
        <span class="tree-gate-label ${type}">${label}</span>
        <span class="tree-gate-score ${scoreClass(overall)}">${fmt(overall)}</span>
      </div>
      <div class="tree-rubrics ${open ? 'open' : ''}" id="tree-rubrics-${type}">
        ${rows || '<div class="no-data">No rubric data available</div>'}
      </div>
    </div>`;
        }

        function toggleGate(type) {
            document.getElementById(`tree-rubrics-${type}`)?.classList.toggle('open');
            document.getElementById(`tree-chevron-${type}`)?.classList.toggle('open');
        }

        function renderSegments() {
            const segs = (DATA.segments || []).filter(s => s.segment_type === 'instructional' && segAvg(s) > 0);
            const wrap = document.getElementById('segments-wrap');
            const title = document.getElementById('seg-section-title');

            title.textContent = `Instructional Segments (${segs.length})`;

            if (!segs.length) {
                wrap.innerHTML = '<div class="no-data">No instructional segments found</div>';
                return;
            }

            wrap.innerHTML = `
    <div class="segments-header">
      #  ·  Heading  ·  Avg Score
    </div>
    ${segs.map(seg => {
                const avg = segAvg(seg);
                const heading = seg.heading || `Segment ${seg.segment_id}`;
                return `
        <div class="segment-row" id="seg-row-${seg.segment_id}" onclick="openSegmentPanel(${seg.segment_id})">
          <span class="seg-id">#${seg.segment_id}</span>
          <span class="seg-heading">${esc(heading)}</span>
          <div class="seg-avg-bar-wrap"><div class="mini-bar ${barClass(avg)}" style="width:${barWidth(avg)};height:100%;border-radius:3px"></div></div>
          <span class="seg-avg-score ${scoreClass(avg)}">${fmt(avg)}</span>
        </div>`;
            }).join('')}
  `;
        }

        // ─── PANEL ────────────────────────────────────────────────────────────────────
        function openPanel(title, bodyHtml, activeKey) {
            document.getElementById('panel-title').textContent = title;
            document.getElementById('panel-body').innerHTML = bodyHtml;
            document.getElementById('panel').classList.add('open');
            document.getElementById('main').classList.add('panel-open');

            // deactivate previous
            document.querySelectorAll('.tree-rubric-row.active, .segment-row.active').forEach(el => el.classList.remove('active'));
            if (activeKey) {
                const el = document.getElementById(activeKey);
                if (el) el.classList.add('active');
            }
            activePanel = activeKey;
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
            document.getElementById('main').classList.remove('panel-open');
            document.querySelectorAll('.tree-rubric-row.active, .segment-row.active').forEach(el => el.classList.remove('active'));
            activePanel = null;
        }

        function openRubricPanel(type, key) {
            const panelKey = `rubric-row-${type}-${key}`;
            if (activePanel === panelKey) { closePanel(); return; }

            const assessment = DATA.assessment || {};
            const gate = type === 'module' ? assessment.module_gate : assessment.course_gate;
            const rubrics = gate?.rubrics || {};
            const rubric = rubrics[key] || {};
            const score = rubric.score ?? 0;
            const rationale = rubric.rationale || '—';

            // Collect per-segment scores for this rubric (module gate only)
            let segTable = '';
            if (type === 'module') {
                const segs = (DATA.segments || []).filter(s => s.segment_type === 'instructional' && (s.scores || {})[key] > 0);
                if (segs.length) {
                    const rows = segs.map(seg => {
                        const s = (seg.scores || {})[key] ?? 0;
                        const rat = (seg.reasoning || {})[`${key}_rationale`] || '';
                        const heading = seg.heading || `Segment ${seg.segment_id}`;
                        return `<tr>
          <td class="td-id">#${seg.segment_id}</td>
          <td class="td-score ${scoreClass(s)}">${fmt(s)}</td>
          <td class="td-rat">${esc(rat.slice(0, 120))}${rat.length > 120 ? '…' : ''}</td>
        </tr>`;
                    }).join('');
                    segTable = `
        <div class="panel-label">Per-Segment Scores</div>
        <table class="seg-scores-table">
          <thead><tr><th>Seg</th><th>Score</th><th>Rationale</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
                }
            }

            const html = `
    <div class="panel-rubric-name">${esc(key)}</div>
    <div class="panel-score-row">
      <div class="panel-score-big ${scoreClass(score)}">${fmt(score)}</div>
      <div class="panel-bar-wrap"><div class="panel-bar ${barClass(score)}" style="width:${barWidth(score)}"></div></div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--text-muted);flex-shrink:0">/ 10</div>
    </div>
    <div class="panel-label">Best Rationale</div>
    <div class="panel-rationale">${esc(rationale)}</div>
    ${segTable}
  `;

            const gateLabel = type === 'module' ? 'Module Gate' : 'Course Gate';
            openPanel(`${gateLabel} · ${key}`, html, panelKey);
        }

        function openSegmentPanel(segId) {
            const panelKey = `seg-row-${segId}`;
            if (activePanel === panelKey) { closePanel(); return; }

            const seg = (DATA.segments || []).find(s => s.segment_id === segId);
            if (!seg) return;

            const heading = seg.heading || `Segment ${segId}`;
            const scores = seg.scores || {};
            const reasoning = seg.reasoning || {};

            // Layer 1: Scores
            const scoreRows = Object.entries(scores)
                .filter(([, v]) => typeof v === 'number' && v > 0)
                .map(([key, val]) => `
      <div class="score-grid-row">
        <div class="score-grid-name">${esc(key)}</div>
        <div class="score-grid-bar-wrap"><div class="rubric-bar ${barClass(val)}" style="width:${barWidth(val)};height:100%"></div></div>
        <div class="score-grid-val ${scoreClass(val)}">${fmt(val)}</div>
      </div>`).join('');

            // Layer 2: Rationales
            const ratRows = Object.entries(reasoning)
                .filter(([, v]) => v && v.length > 0)
                .map(([key, val]) => {
                    const cleanKey = key.replace(/_rationale$/, '');
                    return `<div class="rat-item">
        <div class="rat-item-name">${esc(cleanKey)}</div>
        <div class="rat-item-text">${esc(val)}</div>
      </div>`;
                }).join('');

            const summaryBlock = seg.summary ? `
    <div class="seg-summary-label">Summary</div>
    <div class="seg-summary-box">${esc(seg.summary)}</div>` : '';

            const html = `
    ${summaryBlock}
    <div class="toggle-layer">
      <div class="toggle-layer-header" onclick="toggleLayer('layer-scores-${segId}')">
        <span class="toggle-layer-title">Scores</span>
        <span class="toggle-layer-chevron open" id="chev-scores-${segId}">▲</span>
      </div>
      <div class="toggle-layer-body open" id="layer-scores-${segId}">
        <div class="score-grid">${scoreRows || '<div class="no-data">No scores</div>'}</div>
      </div>
    </div>
    <div class="toggle-layer">
      <div class="toggle-layer-header" onclick="toggleLayer('layer-rat-${segId}')">
        <span class="toggle-layer-title">Rationales</span>
        <span class="toggle-layer-chevron" id="chev-rat-${segId}">▲</span>
      </div>
      <div class="toggle-layer-body" id="layer-rat-${segId}">
        <div class="rat-grid">${ratRows || '<div class="no-data">No rationales</div>'}</div>
      </div>
    </div>
    <div class="toggle-layer">
      <div class="toggle-layer-header" onclick="toggleLayer('layer-text-${segId}')">
        <span class="toggle-layer-title">Full Text</span>
        <span class="toggle-layer-chevron" id="chev-text-${segId}">▲</span>
      </div>
      <div class="toggle-layer-body" id="layer-text-${segId}">
        <div class="seg-full-text">${esc(seg.text || '(no text)')}</div>
      </div>
    </div>
  `;

            openPanel(`Seg #${segId} · ${heading.slice(0, 40)}`, html, panelKey);
        }

        function toggleLayer(id) {
            const body = document.getElementById(id);
            if (!body) return;
            const isOpen = body.classList.toggle('open');
            const chevId = id.replace('layer-', 'chev-');
            const chev = document.getElementById(chevId);
            if (chev) chev.classList.toggle('open', isOpen);
        }

        // ─── UTIL ─────────────────────────────────────────────────────────────────────
        function esc(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Close panel on Escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
    </script>
</body>

</html>
